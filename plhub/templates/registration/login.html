<!DOCTYPE html>
<html lang="zh-Cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PL Hub</title>
    <style>
        body { font-family: sans-serif; margin: 2rem; max-width: 360px; }
        h1 { margin-bottom: 1rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.25rem; }
        .form-group input { width: 100%; padding: 0.5rem; }
        button[type="submit"] { padding: 0.5rem 1rem; background: #5a4a7a; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
        .errorlist { color: #c00; font-size: 0.9rem; margin-top: 0.25rem; }
        a { color: #5a4a7a; }
    </style>
</head>
<body>
    <h1>Login</h1>
    {% if form.errors %}
        <p class="errorlist">Username or password error, please try again.</p>
    {% endif %}
    <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_username">Username</label>
            {{ form.username }}
        </div>
        <div class="form-group">
            <label for="id_password">Password</label>
            {{ form.password }}
        </div>
        <button type="submit">Login</button>
    </form>
    <p style="margin-top: 1rem;"><a href="{% url 'register' %}">No account? Register</a> &nbsp;|&nbsp; <a href="/">Back</a></p>
</body>
</html>
